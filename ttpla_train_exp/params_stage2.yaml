dataset: "ttpla"
batch_size: 2
epoch: 200                        # Stage1 epoch에 이어서 학습
keep: 'True'
checkpoint_iteration: '1'
eval_iteration: '1'

img_height: 1024
conf_match_weight: 1,10
best_mean_loss: true
confidence: 0.6
loggers: ["file", "tb"]
darknet_weights: "/home/work/caps_drone/yolino/YOLinO/ttpla_train_exp/yolov3.weights"

# ---- Backbone (ConvNeXt-Tiny + FPN) ----
fpn_out_channels: 256
head_level: P3
backbone_pretrained: True         # 체크포인트 로드되면 무시됨
fpn_upsample_mode: nearest
backbone_freeze_epochs: 0         # Stage2에서는 backbone도 같이 fine-tune

scale: 16

# ---- Stage 2 (Geometry + Embedding joint) ----
training_variables: geom,confidence,instance
loss: norm_mean,mse_mean,discriminative_embedding
activations: linear,sigmoid,linear

loss_weight_strategy: fixed
# geom > conf >> embed (warmup이 끝나면 embed_loss가 정상 크기로 들어옴)
weights: "1.5,1.0,0.3"

# ---- Discriminative embedding (warmup 적용) ----
embedding_delta_v: 0.5
embedding_delta_d: 2.0
embedding_lambda_reg: 0.001
embedding_concat_geom_dims: 0
embedding_loss_warmup_epochs: 5   # 0→1 선형 ramp (5 epoch)

# ---- LR (Stage1보다 살짝 낮춰서 안정화) ----
learning_rate: 0.0005
lr_backbone: 0.00001
lr_fpn:      0.0001
lr_geom:     0.0002
lr_embed:    0.0008
scheduler: warmup_cosine
warmup_epochs: 2
min_lr_ratio: 0.05
scheduler_step_per_batch: True
amp: True
grad_clip_norm: 5.0
ddp_find_unused_parameters: True
