dataset: "ttpla"
run_name: "exp02_strict_hard_darknet_nofpn"

batch_size: 10
epoch: 50
img_height: 576

scale: 32
head_level: P4
backbone: darknet
use_fpn: false
backbone_pretrained: True

training_variables: geom,confidence
activations: linear,sigmoid
loss: norm_mean,mse_mean
loss_weight_strategy: fixed
weights: "2,1"
conf_match_weight: 5,1
confidence: 0.3

# Strict hard matching (confidence fully excluded in assignment)
loss_hard_matching: true
match_by_conf_first: false
use_conf_in_loss_matching: false

amp: false
loading_workers: 4
augment: crop,rotation,jitter,erasing,noise,normalize
keep: "True"
checkpoint_iteration: "1"
eval_iteration: "1"
