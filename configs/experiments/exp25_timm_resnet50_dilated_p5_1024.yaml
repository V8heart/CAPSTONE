# exp25: exp19 기반, timm ResNet50(dilated, output_stride=16) + stride32 P5 head.
dataset: "ttpla"
dataset_ttpla: "/home/work/caps_drone/yolino/ttpla_yolino_dataset_1024_downsample"
run_name: "exp25_timm_resnet50_dilated_p5_1024"
loggers: [ file, tb ]

batch_size: 8
epoch: 50
img_height: 1024

scale: 32
head_level: P5
backbone: timm
timm_model_name: resnet50_dilated
timm_force_stride32_head: true
use_fpn: true
use_bottom_up: true
backbone_pretrained: True

num_predictors: 4

training_variables: geom,confidence
activations: linear,sigmoid
loss: norm_mean,mse_mean
loss_weight_strategy: fixed
weights: "2,1"
conf_match_weight: 1,10
confidence: 0.5

loss_hard_matching: true
match_by_conf_first: true
use_conf_in_loss_matching: false

amp: false
loading_workers: 4
augment: crop,rotation,jitter,erasing,noise,normalize
keep: "True"
checkpoint_iteration: "1"
eval_iteration: "1"

skip_best_model_eval: true
