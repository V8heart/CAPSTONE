dataset: "ttpla"
run_name: "exp01_baseline_darknet_nofpn_confgated"

batch_size: 8
epoch: 50
img_height: 576

scale: 32
head_level: P4
backbone: darknet
use_fpn: false
backbone_pretrained: True
darknet_weights: "/home/work/caps_drone/yolino/YOLinO/ttpla_train_exp/yolov3.weights"

training_variables: geom,confidence
activations: linear,sigmoid
loss: norm_mean,mse_mean
loss_weight_strategy: fixed
weights: "2,1"
conf_match_weight: 5,1
confidence: 0.3
loggers: ["file", "tb"]

# Existing bipartite mode (confidence-gated)
loss_hard_matching: true
match_by_conf_first: true
use_conf_in_loss_matching: false

amp: false
loading_workers: 4
augment: crop,rotation,jitter,erasing,noise,normalize
keep: "True"
checkpoint_iteration: "1"
eval_iteration: "1"
