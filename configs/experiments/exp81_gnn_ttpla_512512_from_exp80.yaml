# exp81: exp78 GNN (directional2_ctx) improved — init geom from exp80 (scale16/P3).
# Changes vs exp78: conf=0.5 unified; relaxed line pool; CC τ=0.2.
# Loss balance: lower pos (fewer false merges) + stronger cross-inst penalty.
dataset: "ttpla"
dataset_ttpla: "/home/work/caps_drone/yolino/YOLinO_benchmark"
run_name: "exp81_gnn_ttpla_512512_from_exp80"
loggers: [ file, tb ]

batch_size: 8
epoch: 100
img_height: 512

scale: 16
head_level: P3
backbone: convnext
use_fpn: true
use_bottom_up: true
backbone_pretrained: true

num_predictors: 4

training_variables: geom,confidence
activations: linear,sigmoid
loss: norm_mean,mse_mean
loss_weight_strategy: fixed
weights: "2,1"
conf_match_weight: 1,10
confidence: 0.5

loss_hard_matching: true
match_by_conf_first: true
use_conf_in_loss_matching: false

learning_rate: 0.0001
lr_backbone: 0.0
lr_fpn: 0.0
lr_geom: 0.0
lr_e2e: 0.0001
backbone_freeze_epochs: 10
optimizer: adam
decay_rate: 0.0
scheduler: warmup_cosine
warmup_epochs: 0
min_lr_ratio: 0.1
scheduler_step_per_batch: true
grad_clip_norm: 1.0
best_mean_loss: true

patience: 25
earliest_stop: 75

amp: false
ddp_find_unused_parameters: true
loading_workers: 0
augment: crop,rotation,jitter,erasing,noise,normalize
keep: "True"
checkpoint_iteration: "1"
eval_iteration: "1"

explicit_model: "log/checkpoints/exp80_ttpla_512512_scale16/best_model.pth"

skip_best_model_eval: true

e2e_differentiable_postproc: true
e2e_mode: gnn
e2e_train_with_gt_polylines: false

e2e_token_dim: 256

gnn_max_nodes: 384
gnn_node_conf_thresh: 0.1
gnn_soft_nms: false

gnn_adjacency_mode: directional2_ctx
gnn_use_hard_geom_gate: true
gnn_soft_geom_gate: false

# relaxed line candidate pool (vs exp78 lat=6 dir=0.96 k=6)
gnn_max_lateral_px: 8.0
gnn_max_lateral_sym: true
gnn_lateral_on_overlap_only: false
gnn_max_along_px: 140.0
gnn_max_end_gap_px: 40.0
gnn_min_dir_dot: 0.94
gnn_edge_radius_px: 0.0
gnn_knn_k: 16
gnn_directional_min_sep_px: 8.0
gnn_directional_k: 8
gnn_directional_include_all: false

gnn_context_k: 14
gnn_context_lat_min_px: 6.0
gnn_context_lat_max_px: 30.0
gnn_context_max_along_px: 120.0
gnn_context_min_dir_dot: 0.75

gnn_gat_layers: 3
gnn_heads: 4
gnn_dropout: 0.1

gnn_node_use_visual_feat: false
gnn_use_matched_gt_from_geom: true
gnn_supervise_matched_nodes_only: true

gnn_edge_supervision: polyline_adjacent
gnn_polyline_adjacent_end_px: 12.0

gnn_loss_weight: 0.05
gnn_warmup_epochs: 1
gnn_warmup_start_epoch: 0

gnn_edge_loss_type: cross_ignore
gnn_pos_weight: 1.8
gnn_same_inst_ignore_as_pos: true
gnn_pos_weight_remote: 1.0
gnn_cross_instance_weight: 6.5
gnn_neg_weight: 1.0
gnn_neg_per_pos: 8
gnn_neg_min_kept: 2
gnn_node_assign_radius_px: 24.0

gnn_use_strict_next_hop: false
gnn_next_hop_allow_closed: false
# topology: moderate rw (vs exp78=8); degree cap slightly above exp78
gnn_degree_loss_weight: 0.1
gnn_degree_row_cap: 2.5
gnn_degree_col_cap: 2.5
gnn_rw_topology_weight: 0.1
gnn_rw_start_epoch: 3
gnn_rw_steps: 6
gnn_rw_pos_weight: 9.0
gnn_chamfer_weight: 0.0
gnn_cc_edge_thresh: 0.2

gnn_assembly_max_nodes_per_inst: 32
gnn_assembly_max_instances: 8
gnn_assembly_tier: none

gnn_overlay_edge_thresh: 0.2
gnn_eval_edge_threshs: "0.20,0.30,0.35,0.5"

e2e_gt_max_instances: 64
e2e_gt_max_points: 256
