# exp10 동일 구조 + loss 매칭에서 match_by_conf_first=false (exp07 계열 “strict”).
# 한 셀 안에서는 신뢰도 임계값으로 predictor를 거르지 않고 전 predictor가 기하 거리 매칭에 참여.
dataset: "ttpla"
dataset_ttpla: "/home/work/caps_drone/yolino/ttpla_yolino_dataset_1024_downsample"
run_name: "exp12_fpn_bottomup_p4_strict_match_1024"
loggers: [ file, tb ]

batch_size: 8
epoch: 50
img_height: 1024

scale: 32
head_level: P4
backbone: convnext
use_fpn: true
use_bottom_up: true
backbone_pretrained: True

training_variables: geom,confidence
activations: linear,sigmoid
loss: norm_mean,mse_mean
loss_weight_strategy: fixed
weights: "2,1"
conf_match_weight: 1,10
confidence: 0.5

loss_hard_matching: true
match_by_conf_first: false
use_conf_in_loss_matching: true

amp: false
loading_workers: 4
augment: crop,rotation,jitter,erasing,noise,normalize
keep: "True"
checkpoint_iteration: "1"
eval_iteration: "1"

skip_best_model_eval: true
