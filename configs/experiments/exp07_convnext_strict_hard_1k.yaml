dataset: "ttpla"
run_name: "exp07_convnext_strict_hard_1024"

batch_size: 10
epoch: 50
img_height: 1024

scale: 32
head_level: P4
backbone: convnext
use_fpn: false
backbone_pretrained: True

training_variables: geom,confidence
activations: linear,sigmoid
loss: norm_mean,mse_mean
loss_weight_strategy: fixed
weights: "2,1"
conf_match_weight: 1,10
confidence: 0.5

loggers: ["file", "tb"]
metrics: [f1, precision, recall, accuracy, tp, fn, tn, fp]
log_duplicate_metrics: false
log_strict_metrics: false

loss_hard_matching: true
match_by_conf_first: false
use_conf_in_loss_matching: false

amp: false
loading_workers: 4
augment: crop,rotation,jitter,erasing,noise,normalize
keep: "True"
checkpoint_iteration: "1"
eval_iteration: "1"
