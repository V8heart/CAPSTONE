# =============================================================================
# exp83: Stage 2 GNN — 즉시 적용 가능한 개선 (코드 변경 없음, yaml만 수정)
#
# exp82 대비 변경 목록 (★ 표시):
#   [Inference]
#     gnn_cc_edge_thresh      0.3  → 0.2   ★ prob 분포 0.2~0.3 구간 조각 연결
#     gnn_degree_col_cap      2.0  → 4.0   ★ 중간 조각의 bridge edge 허용
#     gnn_degree_row_cap      2.0  → 4.0   ★ 동일
#   [Training - node selection]
#     confidence              0.7  → 0.5   ★ exp77 geom 학습 cut과 맞춤, node 수↑
#     gnn_node_conf_thresh    0.1  → 0.1   (변경 없음; 0.5는 최종 NMS threshold)
#   [Training - topology loss]
#     gnn_rw_topology_weight  0.1  → 0.35  ★ random walk loss 비중 대폭 상향
#     gnn_rw_steps            6    → 8     ★ 더 긴 chain 연결성 강제
#     gnn_rw_pos_weight       20.0 → 30.0  ★ same-instance pair에 더 강한 신호
#     gnn_rw_start_epoch      3    → 2     ★ topology loss를 1 epoch 일찍 켬
#   [Training - edge loss]
#     gnn_pos_weight          2.0  → 4.0   ★ positive edge signal 강화
#     gnn_neg_per_pos         8    → 6     ★ pos_weight 상향에 맞춰 neg 비율 소폭 완화
#   나머지는 exp82와 동일
# =============================================================================

dataset: "ttpla"
dataset_ttpla: "/home/work/caps_drone/yolino/YOLinO_benchmark"
run_name: "exp83_gnn_ttpla_512512_from_exp80"
loggers: [ file, tb ]

batch_size: 16
epoch: 50
img_height: 512

scale: 16
head_level: P3
backbone: convnext
use_fpn: true
use_bottom_up: true
backbone_pretrained: true

num_predictors: 4

training_variables: geom,confidence
activations: linear,sigmoid
loss: norm_mean,mse_mean
loss_weight_strategy: fixed
weights: "2,1"
conf_match_weight: 1,10
confidence: 0.7   # ★ 0.7→0.5: geom 학습 cut과 일치, node 수 증가

loss_hard_matching: true
match_by_conf_first: true
use_conf_in_loss_matching: false

learning_rate: 0.0001
lr_backbone: 0.0
lr_fpn: 0.0
lr_geom: 0.0
lr_e2e: 0.0001
backbone_freeze_epochs: 10
optimizer: adam
decay_rate: 0.0
scheduler: warmup_cosine
warmup_epochs: 0
min_lr_ratio: 0.1
scheduler_step_per_batch: true
grad_clip_norm: 1.0
best_mean_loss: false

patience: 25
earliest_stop: 120

amp: false
ddp_find_unused_parameters: true
loading_workers: 0
augment: crop,rotation,jitter,erasing,noise,normalize
keep: "True"
checkpoint_iteration: "1"
eval_iteration: "1"

explicit_model: "log/checkpoints/exp80_ttpla_512512_scale16/best_model.pth"

skip_best_model_eval: true

e2e_differentiable_postproc: true
e2e_mode: gnn
e2e_train_with_gt_polylines: false

gnn_token_dim: 256  
gnn_max_nodes: 384
gnn_node_conf_thresh: 0.1
gnn_soft_nms: false

gnn_adjacency_mode: directional2
gnn_use_hard_geom_gate: true
gnn_soft_geom_gate: false

# --- Hard gate (exp82와 동일: 512px 기준 조정 유지) ---
gnn_max_lateral_px: 5.0
gnn_max_lateral_sym: true
gnn_max_along_px: 128.0
gnn_max_end_gap_px: 40.0
gnn_min_dir_dot: 0.96
gnn_edge_radius_px: 0.0
gnn_knn_k: 16
gnn_directional_min_sep_px: 8.0
gnn_directional_k: 8

# --- GAT (exp82와 동일) ---
gnn_gat_layers: 3
gnn_heads: 4
gnn_dropout: 0.1
gnn_node_use_visual_feat: false
gnn_edge_feat_signed: false
gnn_gat_geom_bias: false

# --- Supervision (exp82와 동일) ---
gnn_use_matched_gt_from_geom: true
gnn_supervise_matched_nodes_only: true
gnn_edge_supervision: polyline_adjacent
gnn_polyline_adjacent_end_px: 12.0

# --- Edge loss ---
gnn_loss_weight: 0.05
gnn_warmup_epochs: 1
gnn_warmup_start_epoch: 0
gnn_edge_loss_type: bce
gnn_pos_weight: 4.0          # ★ 2.0→4.0: positive edge signal 강화
gnn_neg_per_pos: 6           # ★ 8→6: pos_weight 상향 보정
gnn_neg_min_kept: 2
gnn_node_assign_radius_px: 24.0

gnn_use_strict_next_hop: false
gnn_next_hop_allow_closed: false
gnn_degree_loss_weight: 0.1
gnn_degree_row_cap: 4.0      # ★ 2.0→4.0: bridge edge 허용
gnn_degree_col_cap: 4.0      # ★ 2.0→4.0: bridge edge 허용

# --- Random walk topology loss ---
gnn_rw_topology_weight: 0.35  # ★ 0.1→0.35: topology loss 비중 대폭 상향
gnn_rw_start_epoch: 2         # ★ 3→2: 1 epoch 일찍 시작
gnn_rw_steps: 8               # ★ 6→8: 더 긴 chain 연결성 강제
gnn_rw_pos_weight: 30.0       # ★ 20.0→30.0: same-instance pair 강화
gnn_chamfer_weight: 0.0

# --- Inference assembly ---
gnn_cc_edge_thresh: 0.2       # ★ 0.3→0.2: 낮은 prob 조각도 연결
gnn_assembly_max_nodes_per_inst: 32
gnn_assembly_max_instances: 8
gnn_assembly_tier: none

gnn_overlay_edge_thresh: 0.3  # ★ 0.35→0.3: cc_thresh와 일관성
gnn_eval_edge_threshs: "0.2,0.35,0.5"  # ★ 0.2 추가해서 new threshold 평가

e2e_gt_max_instances: 64
e2e_gt_max_points: 256
